version: 2

models:

  - name: int_customer_360

    columns:

      - name: customer_key
        tests:
          - unique
          - not_null

      - name: account_id
        tests:
          - unique
          - not_null

  - name: int_user_hierarchy

    columns:

      - name: user_key
        tests:
          - unique
          - not_null

      - name: user_id
        tests:
          - unique
          - not_null

  - name: int_opportunity_enriched

    columns:

      - name: opportunity_key
        tests:
          - unique
          - not_null

      - name: customer_key
        tests:
          - relationships:
              arguments:
                to: ref('int_customer_360')
                field: customer_key

      - name: user_key
        tests:
          - relationships:
              arguments:
                to: ref('int_user_hierarchy')
                field: user_key

  - name: int_opportunity_stage_history

    columns:

      - name: opportunity_stage_key
        tests:
          - not_null

  - name: int_case_lifecycle

    columns:

      - name: case_key
        tests:
          - unique
          - not_null

      - name: accountid
        tests:
          - relationships:
              arguments:
                to: ref('int_customer_360')
                field: account_id

  - name: int_product_catalog

    columns:

      - name: product_key
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

  - name: int_campaign_performance

    columns:

      - name: campaign_key
        tests:
          - unique
          - not_null

      - name: campaign_id
        tests:
          - not_null

  - name: int_lead_conversion

    columns:

      - name: lead_key
        tests:
          - unique
          - not_null

      - name: lead_id
        tests:
          - unique
          - not_null